version: "3.9"

services:
  db:
    image: mysql:8.0.33
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_CONNECTION_SECRET:-tempdbpassword}
      MYSQL_DATABASE: ${DB_NAME:-pizza}
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -p$MYSQL_ROOT_PASSWORD"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - mysql-data:/var/lib/mysql

  api:
    image: node:22
    working_dir: /app
    command: sh -c "npm install && npm start"
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "3000:3000"
    env_file:
      - docker/dev.env
    environment:
      DB_HOSTNAME: db
      DB_USER: root
      DB_CONNECTION_SECRET: ${DB_CONNECTION_SECRET:-tempdbpassword}
      DB_NAME: ${DB_NAME:-pizza}
      METRICS_SOURCE: ${METRICS_SOURCE:-jwt-pizza-service-dev}
    volumes:
      - .:/app:cached

volumes:
  mysql-data:
